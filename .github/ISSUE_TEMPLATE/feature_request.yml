name: Feature request
description: Suggest an enhancement for the Threadbase ecosystem
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        If this request is implementation-specific, please open it in the relevant component repository.
  - type: input
    id: component
    attributes:
      label: Target component/repository
      description: Which repo should implement this?
      placeholder: threadbase-streamer / threadbase-mobile / threadbase-vscode / etc.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
    validations:
      required: true
